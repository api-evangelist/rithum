naftiko: "1.0.0-alpha1"

info:
  label: "Dsco Platform API"
  description: >-
    The Dsco Platform API v3 provides dropship and marketplace commerce
    integration for retailers and suppliers. Supports order management,
    catalog synchronization, inventory updates, shipment tracking, returns,
    and invoice workflows.
  tags:
    - Commerce
    - Dropship
    - Marketplace
    - Ecommerce
    - Rithum
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      DSCO_CLIENT_ID: DSCO_CLIENT_ID
      DSCO_CLIENT_SECRET: DSCO_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: dsco
      baseUri: https://api.dsco.io/api/v3
      description: "Dsco Platform API for dropship and marketplace commerce integration"
      authentication:
        type: bearer
        token: "{{DSCO_ACCESS_TOKEN}}"
      resources:
        - name: authentication
          path: /oauth2/token
          description: "OAuth2 token management"
          operations:
            - name: get-access-token
              method: POST
              description: "Obtain OAuth2 bearer token using client credentials"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: supplier-catalog
          path: /supplier/catalog-in
          description: "Supplier catalog management"
          operations:
            - name: supplier-update-catalog
              method: POST
              description: "Create or update supplier product catalog items"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  items: "{{tools.items}}"

        - name: supplier-inventory
          path: /supplier/inventory-in
          description: "Supplier inventory management"
          operations:
            - name: supplier-update-inventory
              method: POST
              description: "Update supplier inventory quantities"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  items: "{{tools.items}}"

        - name: supplier-shipments
          path: /supplier/shipment-in
          description: "Supplier shipment creation"
          operations:
            - name: supplier-create-shipment
              method: POST
              description: "Create shipment records for fulfilled orders"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  shipments: "{{tools.shipments}}"

        - name: supplier-orders
          path: /supplier/order-out
          description: "Supplier order retrieval"
          operations:
            - name: supplier-list-orders
              method: GET
              description: "List orders for supplier fulfillment"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter orders by status"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of orders to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: supplier-order-detail
          path: /supplier/order-out/{orderId}
          description: "Supplier order detail retrieval"
          operations:
            - name: supplier-get-order
              method: GET
              description: "Get a specific order by ID"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "The unique order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: supplier-invoices
          path: /supplier/invoice-in
          description: "Supplier invoice processing"
          operations:
            - name: supplier-create-invoice
              method: POST
              description: "Submit invoices for fulfilled orders"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  invoices: "{{tools.invoices}}"

        - name: supplier-cancellations
          path: /supplier/cancel-in
          description: "Supplier order cancellation"
          operations:
            - name: supplier-cancel-order-item
              method: POST
              description: "Cancel an order item"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cancellations: "{{tools.cancellations}}"

        - name: supplier-acknowledge
          path: /supplier/acknowledge-order-in
          description: "Supplier order acknowledgment"
          operations:
            - name: supplier-acknowledge-order
              method: POST
              description: "Acknowledge receipt of orders"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  orderIds: "{{tools.orderIds}}"

        - name: retailer-orders
          path: /retailer/order-in
          description: "Retailer order submission"
          operations:
            - name: retailer-create-order
              method: POST
              description: "Submit consumer orders to the Dsco platform"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  orders: "{{tools.orders}}"

        - name: retailer-cancellations
          path: /retailer/cancel-in
          description: "Retailer order cancellation"
          operations:
            - name: retailer-request-cancel
              method: POST
              description: "Request cancellation of an order item"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cancellations: "{{tools.cancellations}}"

        - name: streams
          path: /streams
          description: "Event stream management"
          operations:
            - name: create-stream
              method: POST
              description: "Create a new event stream"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  objectType: "{{tools.objectType}}"
                  queryParams: "{{tools.queryParams}}"

            - name: list-streams
              method: GET
              description: "List all event stream definitions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: stream-events
          path: /streams/{streamId}/events
          description: "Stream event retrieval"
          operations:
            - name: get-stream-events
              method: GET
              description: "Retrieve events from a stream starting at a checkpoint"
              inputParameters:
                - name: streamId
                  in: path
                  type: string
                  required: true
                  description: "The stream identifier"
                - name: position
                  in: query
                  type: string
                  required: false
                  description: "Checkpoint position to start reading from"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of events to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: dsco-rest
      resources:
        - path: /v1/orders
          name: orders
          description: "Order management"
          operations:
            - method: GET
              name: list-orders
              description: "List supplier orders"
              call: "dsco.supplier-list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-retailer-order
              description: "Create a retailer order"
              call: "dsco.retailer-create-order"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orders/{orderId}
          name: order-detail
          description: "Order detail"
          operations:
            - method: GET
              name: get-order
              description: "Get a specific order"
              call: "dsco.supplier-get-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/catalog
          name: catalog
          description: "Catalog management"
          operations:
            - method: POST
              name: update-catalog
              description: "Update product catalog"
              call: "dsco.supplier-update-catalog"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/inventory
          name: inventory
          description: "Inventory management"
          operations:
            - method: POST
              name: update-inventory
              description: "Update inventory levels"
              call: "dsco.supplier-update-inventory"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/shipments
          name: shipments
          description: "Shipment management"
          operations:
            - method: POST
              name: create-shipment
              description: "Create a shipment record"
              call: "dsco.supplier-create-shipment"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/streams
          name: streams
          description: "Event stream management"
          operations:
            - method: GET
              name: list-streams
              description: "List event streams"
              call: "dsco.list-streams"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-stream
              description: "Create an event stream"
              call: "dsco.create-stream"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: dsco-mcp
      transport: http
      tools:
        - name: list-supplier-orders
          description: "List orders for supplier fulfillment"
          hints:
            readOnly: true
            openWorld: false
          call: "dsco.supplier-list-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-supplier-order
          description: "Get a specific order by ID"
          hints:
            readOnly: true
            openWorld: false
          call: "dsco.supplier-get-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-retailer-order
          description: "Submit a consumer order to the platform"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.retailer-create-order"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-catalog
          description: "Update supplier product catalog"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.supplier-update-catalog"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-inventory
          description: "Update supplier inventory quantities"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.supplier-update-inventory"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-shipment
          description: "Create a shipment record for fulfilled orders"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.supplier-create-shipment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-invoice
          description: "Submit invoice for fulfilled orders"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.supplier-create-invoice"
          outputParameters:
            - type: object
              mapping: "$."

        - name: cancel-order-item
          description: "Cancel an order item"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "dsco.supplier-cancel-order-item"
          outputParameters:
            - type: object
              mapping: "$."

        - name: acknowledge-order
          description: "Acknowledge receipt of orders"
          hints:
            readOnly: false
            destructive: false
          call: "dsco.supplier-acknowledge-order"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stream-events
          description: "Retrieve events from a stream"
          hints:
            readOnly: true
            openWorld: false
          call: "dsco.get-stream-events"
          with:
            streamId: "tools.streamId"
            position: "tools.position"
          outputParameters:
            - type: object
              mapping: "$."
