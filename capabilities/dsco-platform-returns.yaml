naftiko: 1.0.0-alpha2
info:
  label: Dsco Platform API — Returns
  description: 'Dsco Platform API — Returns. 2 operations. Lead operation: Create Retailer Return. Self-contained Naftiko
    capability covering one Rithum business surface.'
  tags:
  - Rithum
  - Returns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RITHUM_API_KEY: RITHUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: dsco-platform-returns
    baseUri: https://api.dsco.io/api/v3
    description: Dsco Platform API — Returns business capability. Self-contained, no shared references.
    resources:
    - name: retailer-return-in
      path: /retailer/return-in
      operations:
      - name: retailercreatereturn
        method: POST
        description: Create Retailer Return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: supplier-return-in
      path: /supplier/return-in
      operations:
      - name: suppliercreatereturn
        method: POST
        description: Create Return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RITHUM_API_KEY}}'
  exposes:
  - type: rest
    namespace: dsco-platform-returns-rest
    port: 8080
    description: REST adapter for Dsco Platform API — Returns. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/retailer/return-in
      name: retailer-return-in
      description: REST surface for retailer-return-in.
      operations:
      - method: POST
        name: retailercreatereturn
        description: Create Retailer Return
        call: dsco-platform-returns.retailercreatereturn
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/supplier/return-in
      name: supplier-return-in
      description: REST surface for supplier-return-in.
      operations:
      - method: POST
        name: suppliercreatereturn
        description: Create Return
        call: dsco-platform-returns.suppliercreatereturn
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dsco-platform-returns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dsco Platform API — Returns. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-retailer-return
      description: Create Retailer Return
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dsco-platform-returns.retailercreatereturn
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-return
      description: Create Return
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dsco-platform-returns.suppliercreatereturn
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
