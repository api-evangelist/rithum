naftiko: 1.0.0-alpha2
info:
  label: Dsco Platform API — Authentication
  description: 'Dsco Platform API — Authentication. 1 operations. Lead operation: Get Access Token. Self-contained Naftiko
    capability covering one Rithum business surface.'
  tags:
  - Rithum
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RITHUM_API_KEY: RITHUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: dsco-platform-authentication
    baseUri: https://api.dsco.io/api/v3
    description: Dsco Platform API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth2-token
      path: /oauth2/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RITHUM_API_KEY}}'
  exposes:
  - type: rest
    namespace: dsco-platform-authentication-rest
    port: 8080
    description: REST adapter for Dsco Platform API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth2/token
      name: oauth2-token
      description: REST surface for oauth2-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get Access Token
        call: dsco-platform-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dsco-platform-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dsco Platform API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-access-token
      description: Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: dsco-platform-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
