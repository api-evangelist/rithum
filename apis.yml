apis:
  - aid: rithum:dsco-platform-api
    name: Dsco Platform API
    description: >-
      The Dsco Platform API v3 provides dropship and marketplace commerce integration for retailers and suppliers. It
      supports order management, catalog synchronization, inventory updates, shipment tracking, returns processing, and
      invoice workflows via streaming and batch endpoints. Authentication uses OAuth2 bearer tokens obtained from the
      token endpoint.
    humanURL: https://api.dsco.io/
    baseURL: https://api.dsco.io/api/v3
    tags:
